<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GuardNest (Patched)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="screen-auth">
  <h2>Create Account</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="doRegister()">Create Account</button>
</div>

<div id="screen-app" style="display:none;">
  <h2>APP LOADED ✅</h2>
  <p>You are logged in.</p>
</div>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_ANON = "YOUR_ANON_KEY";

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;

// 🔥 CENTRALIZED POST AUTH FIX
function completePostAuth(session) {
  console.log("POST AUTH COMPLETE", session);

  currentUser = session.user;

  document.getElementById("screen-auth").style.display = "none";
  document.getElementById("screen-app").style.display = "block";
}

// 🔥 AUTH LISTENER
supa.auth.onAuthStateChange((event, session) => {
  console.log("AUTH EVENT", event, session);

  if (session?.user) {
    completePostAuth(session);
  }
});

// 🔥 CLEAN REGISTER FUNCTION
async function doRegister() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supa.auth.signUp({
    email,
    password
  });

  console.log("REGISTER RESULT", { data, error });

  if (error) {
    alert(error.message);
    return;
  }

  if (data?.user && data?.session) {
    completePostAuth(data.session);
  } else {
    alert("Signup returned no session.");
  }
}
</script>

</body>
</html>
